# ============================================================
# AgentForge — Docker Compose Configuration
# ============================================================
# Run the entire platform with a single command:
#   docker compose up --build
#
# Services:
#   - app         → Next.js application on port 3000
#   - ws-service  → Socket.io service on port 3003
#   - app-data    → Persistent volume for SQLite database
# ============================================================

version: "3.8"

services:
  # --------------------------------------------------------
  # Next.js Application
  # --------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./db/custom.db
      - WS_SERVICE_URL=http://ws-service:3003
      - WS_SERVICE_PORT=3003
      - NEXT_PUBLIC_APP_NAME=AgentForge
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NODE_ENV=production
    volumes:
      - app-data:/app/db
    depends_on:
      - ws-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --------------------------------------------------------
  # WebSocket Service (Socket.io)
  # --------------------------------------------------------
  ws-service:
    build:
      context: ./mini-services/ws-service
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - CORS_ORIGIN=http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# --------------------------------------------------------
# Persistent Volumes
# --------------------------------------------------------
volumes:
  app-data:
    driver: local
